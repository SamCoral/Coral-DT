<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAM CORAL DIGITAL</title>
    <style>
        body{
    background: radial-gradient(ellipse at center,
 #0a2e38 0%,
    #000 35%)
}

#clock{
    font-family: 'Times New Roman', Times, serif;
    text-align:  center;
    color:#daf6ff;
    text-shadow: 0 0 20px rgb(10, 175, 230, 1),
    0 0 20px, rgba(13, 25, 184, 0);
}

.date{
    letter-spacing: 0.1em;
    font-size:24px;
}

.time{
    letter-spacing: 0.0.5em;
    font-size:80px;
    padding: 5px 0;
}

.text{
    letter-spacing: 0.1em;
    font-size:12px;
    padding:20px 0 0;
    color: #daf6ff;
}
    </style>
</head>
<body>
    
<div id="clock">
    <p class="date">2026-02-21 fri</p>
    <p class="time">03:00:33</p>
    <p class="text">SAM CORAL DIGITAL CLOCK</P>
</div>
<script>
    const dayOfWeeks = [
    'SUN', 'MON', 'TUE',
    'WED', 'THU', 'FRI', 'SAT'
];
const $time = document.querySelector('.time');
const $dates = document.querySelector('.date');

function padStart(value, length) {
    return String(value).padStart(length, '0');
}
function update(){
    const now = new Date();
const[
    hours, minutes, seconds,
    year, month, date, day,
] = [
    now.getHours(),  now.getMinutes(),  now.getSeconds(),
    now.getFullYear(),  now.getMonth(),
    now.getDate(), now.getDay(),
];

 $time.innerText = `${padStart(hours, 2)}:${padStart
(minutes, 2)}:${padStart(seconds, 2)}`;
$date.innerText = `${padStart(year, 4)}-${padStart
(month + 1, 2)}-${padStart(date, 2)} ${dayOfWeeks[day]}
`
}

update();
setInterval(update, 1000);
</script>
</body>
</html>
